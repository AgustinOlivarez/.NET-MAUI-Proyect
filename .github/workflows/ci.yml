name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        dotnet-version: [9.0]

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      # --- Instalar los paquetes de MAUI ---
      - name: Instalar Workloads de MAUI
        run: dotnet workload install maui

      - name: Cache de paquetes NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restaurar dependencias
        run: dotnet restore

      # --- Compilamos solo Android para evitar el choque de OS ---
      - name: Compilar Librerias y Pruebas (Puro .NET 9)
        run: |
          dotnet build MauiApp1.Core/MauiApp1.Core.csproj --configuration Release --no-restore
          dotnet build MauiApp1.Tests/MauiApp1.Tests.csproj --configuration Release --no-restore

      - name: Compilar Aplicacion (Android)
        run: dotnet build MauiApp1.csproj -f net9.0-android --configuration Release --no-restore

      # --- Ejecutamos las pruebas (net9.0) ---
      - name: Ejecutar Pruebas Unitarias
        run: dotnet test MauiApp1.Tests/MauiApp1.Tests.csproj --configuration Release --verbosity normal

      # --- Separamos los nombres de los artefactos ---
      - name: Subir artefacto compilado
        uses: actions/upload-artifact@v4
        with:
          name: build-output-${{ matrix.os }}
          path: |
            **/bin/Release